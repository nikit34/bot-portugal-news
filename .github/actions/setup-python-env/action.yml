name: 'Setup Python Environment'
description: 'Sets up Python environment with dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: venv
        key: pip-${{ hashFiles('requirements.txt') }}
        restore-keys: pip-
    
    - name: Install dependencies
      shell: bash
      run: |
        python -m venv venv
        . venv/bin/activate
        n=0
        until pip install -r requirements.txt; do
          n=$((n+1))
          if [ "$n" -ge 5 ]; then echo "pip install failed after $n attempts"; exit 1; fi
          echo "pip install failed (transient download?), retry $n/5 in 15s..."; sleep 15
        done
        python -m spacy download pt_core_news_sm || true
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV 