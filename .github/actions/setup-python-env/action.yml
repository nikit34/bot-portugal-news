name: 'Setup Python Environment'
description: 'Sets up Python environment with dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: venv
        key: pip-${{ hashFiles('requirements.txt') }}
        restore-keys: pip-
    
    - name: Install dependencies
      shell: bash
      run: |
        python -m venv venv
        . venv/bin/activate
        # Устанавливаем всё, КРОМЕ spaCy-модели (она прописана прямым URL на
        # GitHub Releases). pip перекачивает URL-зависимости на каждом прогоне,
        # поэтому при кэш-хите (модель уже в venv) пропускаем скачивание и
        # переживаем 504-сбои GitHub. requirements.txt при этом не меняется.
        grep -v 'pt-core-news-sm' requirements.txt > /tmp/reqs-no-model.txt
        n=0
        until pip install -r /tmp/reqs-no-model.txt; do
          n=$((n+1))
          if [ "$n" -ge 5 ]; then echo "pip install failed after $n attempts"; exit 1; fi
          echo "pip install failed (transient download?), retry $n/5 in 15s..."; sleep 15
        done
        python -c "import pt_core_news_sm" 2>/dev/null || python -m spacy download pt_core_news_sm
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV 