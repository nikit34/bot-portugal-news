name: Bot Schedule

concurrency:
  group: bot-schedule
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)'
        required: false
        default: 'DEBUG'
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
          - CRITICAL
      max_posts_per_run:
        description: 'Max posts per run (throttle cap)'
        required: false
        default: '3'
      post_delay_seconds:
        description: 'Delay between posts, seconds'
        required: false
        default: '40'

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the learning state back as a durable backstop
    steps:
      - uses: actions/checkout@v5
      - name: Check Facebook token
        run: |
          response=$(curl -s "https://graph.facebook.com/v18.0/me?access_token=${{ secrets.FACEBOOK_ACCESS_TOKEN }}")
          if echo "$response" | grep -q "error"; then
            echo "Facebook token is invalid: $response"
            exit 1
          fi
          echo "Facebook token is valid"
      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
      - name: Create logs directory
        run: mkdir -p logs
      - name: Restore/seed learning state
        # Persists state/insights_state.json across runs without external infra.
        # Unique key per run => always saves a fresh cache at job end; restore-keys
        # pulls the most recent prior state. Evict-tolerant: a miss just cold-starts.
        uses: actions/cache@v4
        with:
          path: state
          key: insights-state-${{ github.run_id }}
          restore-keys: |
            insights-state-
      - name: Run bot
        run: python main.py
        timeout-minutes: 15
        continue-on-error: true
        env:
          TELEGRAM_TOKEN_BOT: ${{ secrets.TELEGRAM_TOKEN_BOT }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          LOG_LEVEL: ${{ github.event_name == 'schedule' && 'WARNING' || inputs.log_level || 'DEBUG' }}
          MAX_POSTS_PER_RUN: ${{ inputs.max_posts_per_run || '3' }}
          POST_DELAY_SECONDS: ${{ inputs.post_delay_seconds || '40' }}
          # === Больше видео: крупнее лимит + шире пул + бонус видео в ранкере ===
          MAX_VIDEO_SIZE_MB: '200'      # было 50 — резало клипы 1080p/длиннее
          RANKER_POOL_FACTOR: '8'       # было 4 — пул доходит до TG-каналов с видео
          RANKER_VIDEO_BONUS: '1.5'     # видео всплывает в топ-K (0 => не продвигать)
          # Крупнее видео => дольше ре-энкод/дренаж. Поднимаем таймаут уникализации
          # (иначе fail-open публикует БЕЗ вотермарки) и резерв фазы-2 (иначе один
          # тяжёлый клип съедает окно и остальные посты не выходят).
          VIDEO_UNIQUIFY_TIMEOUT_SECONDS: '240'   # было 120 — под ~200-МБ ре-энкод
          RANKER_DRAIN_RESERVE_SECONDS: '300'     # было 180 — окно дренажа под видео
          # === FB-growth optimization: all levers ON (verified runtime-safe) ===
          # Anti-demotion / content (CAPTION_GUARD + hashtag entity bias are ON by
          # code default). Set the rest here so they're auditable and reversible.
          CARDS_ENABLED: 'true'
          CTA_ENABLED: 'true'
          CTA_EMISSION_RATE: '0.5'   # CTA on ~half of entity posts (anti-repetition)
          STORY_GATE_ENABLED: 'true'
          RANKER_ENABLED: 'true'
          LEARNING_BIAS_ENABLED: 'true'
          LEARNING_TIME_BIAS_ENABLED: 'true'
          LEARNING_BANDIT_ENABLED: 'true'
          LEARNING_REWARD_ENABLED: 'true'
          LEARNING_SCORE_BY_TTL_ENABLED: 'true'
          FB_POST_INSIGHTS_ENABLED: 'true'
          VARIANT_LOGGING_ENABLED: 'true'
      - name: Persist learning state to repo
        # Durable backstop for the learning model on top of actions/cache (which can
        # be evicted after 7 idle days). Runs even if the bot soft-failed (the bot
        # step is continue-on-error) so partial progress is saved. Commits only on a
        # real change; [skip ci] avoids any self-trigger. The state holds only
        # aggregate reward numbers + 50-char heads — no tokens/URLs.
        if: always()
        continue-on-error: true
        run: |
          git config user.name "bot-state[bot]"
          git config user.email "bot-state@users.noreply.github.com"
          git add -f state/insights_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No learning-state change to commit"
          else
            git commit -m "chore: persist learning state [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "state push skipped (non-fast-forward)"
          fi
      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST 'https://api.telegram.org/bot${{ secrets.TOKEN_BOT }}/sendMessage' \
            -d chat_id=-1002178707665 \
            -d parse_mode=Markdown \
            -d text="❌ *CI бота упал!* [Открыть логи CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: parser-logs
          path: logs/
          retention-days: 5
          compression-level: 0
